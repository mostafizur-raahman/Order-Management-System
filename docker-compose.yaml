version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oms_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_management_db
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - oms_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oms_api
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=order_management_db
      - DB_SYNCHRONIZE=true
      - DB_LOGGING=false
      - JWT_SECRET=super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - ENABLE_SEEDER=true
      - SEED_ADMIN_EMAIL=admin@example.com
      - SEED_ADMIN_PASSWORD=Admin@123
      - SEED_USER_EMAIL=user@example.com
      - SEED_USER_PASSWORD=User@123
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    networks:
      - oms_network
    # volumes:
    #   - ./src:/app/src  # Uncomment for hot-reload inside Docker during dev

networks:
  oms_network:
    driver: bridge

volumes:
  pgdata:
